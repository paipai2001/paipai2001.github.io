<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script>

    <style>
        /* 将background-image中url改成自己gif的路径即可 */
        .preloader {
            position: fixed;
            left: 0px;
            top: 0px;
            height: 100%;
            width: 100%;
            z-index: 99999;
            background-color: #ffffff;
            background-position: center center;
            background-repeat: no-repeat;
            background-image: url(https://2021.igem.org/wiki/images/b/bc/T--ECUST_China--preloader.gif);
        }
        .content {
            height: 1000px;
            background-color: red;
        }
    </style>
</head>

<body>
<!-- 加载动画 -->
<div class="preloader"></div>

<!-- 网页内容 -->
<div class="content">1</div>

<script>
    //低版本jquery用的是$(window).load()函数，高版本用的是$(window).on()
    $(window).on('load',function handlePreloader() {
        if ($('.preloader').length) {
            $('.preloader').delay(200).fadeOut(500);
        }
    });
</script>
</body>

</html>
